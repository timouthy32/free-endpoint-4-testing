services:
  api:
    image: python:3.12-slim
    container_name: free-endpoint-4-testing
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8085:8000"
    restart: unless-stopped
